[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | venv
  | node_modules
  | dashboard/node_modules
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"
exclude = [
    ".git",
    ".venv",
    "venv",
    "node_modules",
    "dashboard/node_modules",
    "build",
    "dist"
]

[tool.ruff.lint]
ignore = [
    "F401", # Unused imports
    "F841", # Unused local variables
    "E402", # Module level import not at top of file
    "F821", # Undefined name
    "F811", # Redefinition of unused import
    "F541", # f-string without any placeholders
]
