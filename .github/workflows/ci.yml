name: Continuous Integration

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  lint-and-format:
    name: Lint, Format, and Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Linting & Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install black ruff bandit

      - name: Run Black Code Format Check
        run: black --check . --exclude venv

      - name: Run Ruff Linter
        run: ruff check . --exclude venv

      - name: Run Bandit Security Scanner
        run: bandit -r . -x ./venv,./tests -ll -ii

  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    needs: lint-and-format

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run Test Suite
        env:
          GEMINI_API_KEY: mock_api_key_for_testing
        run: pytest